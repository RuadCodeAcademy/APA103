<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/cs/style.css">
    <title>calculator</title>
</head>
<body>

    <div class="container">
        
        <div class="row">
            <input type="text" class="rounded-input" id="oneinput">
            <input type="text" class="rounded-input" id="twoinput">
        </div>

        
        <div class="row">
            <input type="text" class="rounded-input middle" id="total">
        </div>

        
        <div class="button-group">

            <button class="minus">Minus</button>
            <button class="mult">Mult</button>
            <button class="devide">Devide</button>
        </div>
    </div>








    <script src="/assets/js/script.js"></script>
