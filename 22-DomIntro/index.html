<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <div class="card">
        <div class="card-image">
            <img src="/assets/images/sekil1.png" alt="Evin şəkli">
            <div class="heart-icon">
                <i class="fa-regular fa-heart"></i>
            </div>
        </div>

        <div class="card-content">
            <p class="property-type">DETACHED HOUSE • 5Y OLD</p>
            <h1 class="price">$750,000</h1>
            <p class="address">742 Evergreen Terrace</p>
        </div>

        <div class="details">
            <div class="detail-item">
                <i class="fa-solid fa-bed"></i>
                <span><strong>3</strong> Bedrooms</span>
            </div>
            <div class="detail-item">
                <i class="fa-solid fa-bath"></i>
                <span><strong>2</strong> Bathrooms</span>
            </div>
        </div>

        <div class="realtor-section">
            <p class="realtor-label">REALTOR</p>
            <div class="realtor-info">
                <img src="/assets/images/sekil2.png" alt="Tiffany Heffner" class="agent-photo">
                <div class="agent-details">
                    <h3>Tiffany Heffner</h3>
                    <p>(555) 555-4321</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>



    <script src="/assets/js/script.js"></script>
</body>
</html>
